<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>NEO PIANO — Concert Edition</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet"/>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --ink:      #0D0D0D;
  --paper:    #F5F2E8;
  --white:    #FFFFFF;
  --yellow:   #FFE033;
  --coral:    #FF4D4D;
  --cyan:     #00E5CC;
  --violet:   #A855F7;
  --green:    #22C55E;
  --orange:   #FF7A1A;

  --border-w: 3px;
  --border:   var(--border-w) solid var(--ink);
  --radius:   10px;
  --shadow-s: 4px 4px 0 var(--ink);
  --shadow-m: 6px 6px 0 var(--ink);
  --shadow-l: 10px 10px 0 var(--ink);

  --ff-display: 'Bebas Neue', sans-serif;
  --ff-ui:      'DM Sans', sans-serif;
  --ff-mono:    'JetBrains Mono', monospace;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  -webkit-touch-callout: none;
}

body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--ff-ui);
  overflow: hidden;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

#preloader {
  position: fixed;
  inset: 0;
  background: var(--ink);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
}

.pre-logo {
  font-family: var(--ff-display);
  font-size: 48px;
  color: var(--white);
  letter-spacing: 6px;
  line-height: 1;
}
.pre-logo em { color: var(--yellow); font-style: normal; }

.pre-track {
  width: 280px;
  height: 10px;
  background: #222;
  border: var(--border);
  border-color: #444;
  border-radius: 999px;
  overflow: hidden;
}
#pre-fill {
  height: 100%;
  width: 0%;
  background: var(--yellow);
  transition: width 0.1s linear;
  border-radius: 999px;
}

#pre-label {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: #888;
  letter-spacing: 4px;
  text-transform: uppercase;
}

#shell {
  width: 100vw;
  height: 100vh;
  background: var(--paper);
  border: none;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#shell::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 999;
  opacity: 0.35;
}

#wipe {
  position: absolute;
  inset: 0;
  background: var(--ink);
  z-index: 900;
  transform: translateY(-100%);
  transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
}
#wipe.down { transform: translateY(0); }

.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}
.screen.active { display: flex; }

#s-dash {
  display: none;
  flex-direction: column;
  background: var(--paper);
  padding: 20px;
  gap: 16px;
  overflow-y: auto;
}
#s-dash.active { display: flex; }

.brand {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.brand-title {
  font-family: var(--ff-display);
  font-size: 42px;
  line-height: 0.9;
  letter-spacing: 3px;
  color: var(--ink);
}
.brand-title em { color: var(--coral); font-style: normal; }

.brand-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--ink);
  color: var(--yellow);
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 5px 14px;
  border-radius: 999px;
  width: fit-content;
}
.brand-badge::before {
  content: '●';
  font-size: 8px;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

.score-panel {
  border: var(--border);
  background: var(--white);
  box-shadow: var(--shadow-s);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 200px;
}

.score-panel-head {
  background: var(--ink);
  color: var(--white);
  padding: 12px 16px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.score-panel-head i { color: var(--yellow); }

.score-table-wrap {
  flex: 1;
  overflow-y: auto;
}
.score-table-wrap::-webkit-scrollbar { width: 6px; }
.score-table-wrap::-webkit-scrollbar-thumb { background: var(--ink); }

table { width: 100%; border-collapse: collapse; }
th {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #888;
  padding: 10px 14px;
  border-bottom: 2px solid #eee;
  text-align: left;
}
td {
  padding: 11px 14px;
  font-weight: 700;
  font-size: 13px;
  border-bottom: 1px solid #f0f0f0;
}
.td-score { color: var(--coral); font-family: var(--ff-mono); }
.td-combo { color: var(--violet); font-family: var(--ff-mono); }

.section-label {
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 4px;
  color: #999;
  text-transform: uppercase;
  margin-top: 12px;
  margin-bottom: 2px;
}

.section-title {
  font-family: var(--ff-display);
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--ink);
}

.song-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.song-card {
  background: var(--white);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-m);
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, background 0.15s ease;
  position: relative;
  overflow: hidden;
  touch-action: manipulation;
}

.song-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}

.song-card:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--ink);
}

.song-card.selected {
  background: var(--yellow);
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--ink);
}

.song-icon {
  width: 48px;
  height: 48px;
  border: var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.song-info h4 {
  font-family: var(--ff-display);
  font-size: 18px;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.song-info p {
  font-size: 11px;
  font-weight: 700;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.selected-label {
  font-family: var(--ff-mono);
  font-size: 12px;
  font-weight: 700;
  color: #666;
  min-height: 18px;
}

.btn-start {
  width: 100%;
  padding: 18px;
  background: var(--cyan);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-m);
  font-family: var(--ff-display);
  font-size: 22px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--ink);
  touch-action: manipulation;
}

.btn-start:active:not(:disabled) {
  transform: translate(3px, 3px);
  box-shadow: 3px 3px 0 var(--ink);
}

.btn-start:disabled {
  background: #ddd;
  color: #aaa;
  box-shadow: none;
  cursor: not-allowed;
}

#s-game {
  display: none;
  flex-direction: column;
  height: 100%;
}
#s-game.active { display: flex; }

#g-sidebar {
  background: var(--white);
  border-bottom: var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}

.g-brand {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.g-brand-title {
  font-family: var(--ff-display);
  font-size: 28px;
  letter-spacing: 2px;
}

.g-brand-title em { color: var(--coral); font-style: normal; }

.live-pill {
  background: var(--coral);
  color: var(--white);
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 5px 12px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.live-pill::before { content: '●'; font-size: 8px; animation: blink 0.8s infinite; }

.pov-box {
  border: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: #111;
  height: 100px;
  position: relative;
  box-shadow: var(--shadow-s);
}

.pov-felt {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: #8B0000;
  border-bottom: 2px solid var(--ink);
  z-index: 2;
}

.pov-keys-row {
  display: flex;
  width: 100%;
  height: 100%;
}

.pov-key {
  flex: 1;
  background: #f8f8f8;
  border-right: 1px solid #ccc;
  transition: background 0.06s ease, transform 0.06s ease;
  position: relative;
}
.pov-key:last-child { border-right: none; }
.pov-key.active { background: var(--cyan); transform: translateY(6px); }

.hands-wrap {
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 48px;
  z-index: 10;
  transition: transform 0.08s ease;
  filter: drop-shadow(0 -2px 4px rgba(0,0,0,0.3));
}

.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.metric {
  border: var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  background: var(--paper);
  box-shadow: var(--shadow-s);
  text-align: center;
}

.metric-label {
  font-family: var(--ff-mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: #999;
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}

#g-score {
  font-family: var(--ff-mono);
  font-size: 20px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: 2px;
}

#g-combo {
  font-family: var(--ff-display);
  font-size: 32px;
  color: var(--coral);
  line-height: 1;
}

.prog-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prog-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.prog-label-row span {
  font-family: var(--ff-mono);
  font-size: 9px;
  color: #888;
  letter-spacing: 1px;
}
#g-song-name {
  font-family: var(--ff-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 1px;
}

#g-prog {
  width: 100%;
  height: 6px;
  background: #e0e0e0;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid #ddd;
}
#g-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--yellow));
  transition: width 0.1s ease;
  width: 0%;
}

#g-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #000;
  position: relative;
  overflow: hidden;
}

.piano-wrap {
  flex: 1;
  position: relative;
}

#piano-frame {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.1s ease;
}

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  background: #000;
  touch-action: none;
}

#rating-popup {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) scale(0);
  font-family: var(--ff-display);
  font-size: 36px;
  font-weight: 900;
  pointer-events: none;
  z-index: 500;
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#rating-popup.pop { transform: translateX(-50%) scale(1); }

#beat-flash {
  position: absolute;
  inset: 0;
  background: transparent;
  z-index: 400;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.08s ease;
}
#beat-flash.active { opacity: 0.4; }

.keyboard-area {
  background: var(--ink);
  border-top: var(--border);
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  justify-content: center;
}

.key-label {
  width: 100%;
  aspect-ratio: 1;
  background: #333;
  border: 2px solid #666;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--ff-mono);
  font-weight: 700;
  color: #aaa;
  font-size: 16px;
  transition: background 0.06s ease, border-color 0.06s ease, color 0.06s ease, transform 0.06s ease;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-user-select: none;
}

.key-label:active {
  transform: scale(0.92);
}

.key-label.pressed,
.key-label.touch-active {
  background: var(--cyan);
  border-color: var(--cyan);
  color: var(--ink);
  transform: scale(0.88);
}

.lane-0 { --lane-color: #FF6B6B; }
.lane-1 { --lane-color: #4ECDC4; }
.lane-2 { --lane-color: #FFE66D; }
.lane-3 { --lane-color: #95E1D3; }
.lane-4 { --lane-color: #FF6B6B; }
.lane-5 { --lane-color: #A8E6CF; }

.key-label.lane-0.pressed,
.key-label.lane-0.touch-active { background: var(--lane-0); border-color: var(--lane-0); }
.key-label.lane-1.pressed,
.key-label.lane-1.touch-active { background: var(--lane-1); border-color: var(--lane-1); }
.key-label.lane-2.pressed,
.key-label.lane-2.touch-active { background: var(--lane-2); border-color: var(--lane-2); color: var(--ink); }
.key-label.lane-3.pressed,
.key-label.lane-3.touch-active { background: var(--lane-3); border-color: var(--lane-3); }
.key-label.lane-4.pressed,
.key-label.lane-4.touch-active { background: var(--lane-4); border-color: var(--lane-4); }
.key-label.lane-5.pressed,
.key-label.lane-5.touch-active { background: var(--lane-5); border-color: var(--lane-5); }
</style>

</head>
<body>

<div id="preloader">
  <div class="pre-logo">NEO<em>*</em>PIANO<em>*</em></div>
  <div class="pre-track"><div id="pre-fill"></div></div>
  <div id="pre-label">MENYELARASKAN TUT PIANO...</div>
</div>

<div id="shell">
  <div id="wipe"></div>

  <div id="s-dash" class="screen active">
    <div class="brand">
      <div class="brand-title">NEO<em>*</em>PIANO<em>*</em></div>
      <div class="brand-badge"><span>CONCERT EDITION</span></div>
    </div>

    <div class="score-panel">
      <div class="score-panel-head"><i class="fas fa-crown"></i> PAPAN SKOR TERBAIK</div>
      <div class="score-table-wrap">
        <table>
          <thead><tr><th>LAGU</th><th>SKOR</th><th>COMBO</th></tr></thead>
          <tbody id="score-tbody"></tbody>
        </table>
      </div>
    </div>

    <div>
      <div class="section-label">🎵 Setlist</div>
      <div class="section-title">PILIH LAGU</div>
    </div>

    <div class="song-grid" id="song-grid"></div>

    <div style="margin-top: auto;">
      <div class="selected-label" id="selected-label"></div>
      <button class="btn-start" id="btn-start" disabled>▶ MULAI KONSER</button>
    </div>
  </div>

  <div id="s-game" class="screen">
    <div id="g-sidebar">
      <div class="g-brand">
        <div class="g-brand-title">NEO<em>*</em>PIANO<em>*</em></div>
        <div class="live-pill">LIVE</div>
      </div>

      <div class="pov-box">
        <div class="pov-felt"></div>
        <div class="pov-keys-row">
          <div class="pov-key" id="pk-0"></div>
          <div class="pov-key" id="pk-1"></div>
          <div class="pov-key" id="pk-2"></div>
          <div class="pov-key" id="pk-3"></div>
          <div class="pov-key" id="pk-4"></div>
          <div class="pov-key" id="pk-5"></div>
        </div>
        <div class="hands-wrap" id="hands">👐</div>
      </div>

      <div class="metrics-grid">
        <div class="metric"><span class="metric-label">SKOR</span><div id="g-score">000000</div></div>
        <div class="metric"><span class="metric-label">COMBO</span><div id="g-combo">0</div></div>
      </div>

      <div class="metric">
        <span class="metric-label">PROGRESS</span>
        <div class="prog-wrap">
          <div class="prog-label-row"><span id="g-song-name">SONG</span><span id="g-percent">0%</span></div>
          <div id="g-prog"><div id="g-prog-fill"></div></div>
        </div>
      </div>
    </div>

    <div id="g-area">
      <div class="piano-wrap">
        <div id="piano-frame">
          <canvas id="game-canvas"></canvas>
          <div id="beat-flash"></div>
          <div id="rating-popup">PERFECT!</div>
        </div>
      </div>

      <div class="keyboard-area" id="keyboard-area">
        <div class="key-label lane-0" data-lane="0" id="kl-0">A</div>
        <div class="key-label lane-1" data-lane="1" id="kl-1">S</div>
        <div class="key-label lane-2" data-lane="2" id="kl-2">D</div>
        <div class="key-label lane-3" data-lane="3" id="kl-3">J</div>
        <div class="key-label lane-4" data-lane="4" id="kl-4">K</div>
        <div class="key-label lane-5" data-lane="5" id="kl-5">L</div>
      </div>
    </div>
  </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const SONGS = [
  { name: 'SONG 1', subtitle: 'Slow Pop Vibe', icon: '🎵', file: 'song1.mp3' },
  { name: 'SONG 2', subtitle: 'Energetic Rock', icon: '⚡', file: 'song2.mp3' },
  { name: 'SONG 3', subtitle: 'Acoustic Chill', icon: '🎸', file: 'song3.mp3' },
  { name: 'SONG 4', subtitle: 'Synth Beats', icon: '🥁', file: 'song4.mp3' },
];

const KEY_MAP = { KeyA: 0, KeyS: 1, KeyD: 2, KeyJ: 3, KeyK: 4, KeyL: 5 };
const KEY_FREQS = [261.63, 293.66, 329.63, 392.00, 440.00, 493.88];

let history = JSON.parse(localStorage.getItem('neopiano_v2') || '[]');
let selectedSong = null;
let state = {
  playing: false,
  tiles: [],
  particles: [],
  score: 0,
  combo: 0,
  maxCombo: 0,
  songName: '',
  progress: 0,
  rafId: null,
};

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const HIT_Y = 200;

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('preloader').style.transform = 'translateY(100%)';
  }, 500);
  initSongGrid();
  initGameArea();
  setupKeyboardAndTouch();
  updateScoreTable();
});

function initSongGrid() {
  const grid = document.getElementById('song-grid');
  grid.innerHTML = SONGS.map((s, i) => `
    <div class="song-card" data-idx="${i}">
      <div class="song-icon">${s.icon}</div>
      <div class="song-info">
        <h4>${s.name}</h4>
        <p>${s.subtitle}</p>
      </div>
    </div>
  `).join('');

  grid.addEventListener('click', e => {
    const card = e.target.closest('.song-card');
    if (!card) return;
    selectSong(parseInt(card.dataset.idx));
  });

  grid.addEventListener('touchend', e => {
    const card = e.target.closest('.song-card');
    if (!card) return;
    selectSong(parseInt(card.dataset.idx));
  });
}

function selectSong(idx) {
  document.querySelectorAll('.song-card').forEach((c, i) => {
    c.classList.toggle('selected', i === idx);
  });
  selectedSong = idx;
  document.getElementById('selected-label').textContent = `✓ ${SONGS[idx].name}`;
  document.getElementById('btn-start').disabled = false;
}

function initGameArea() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', resizeCanvas);
}

function resizeCanvas() {
  const frame = document.getElementById('piano-frame');
  canvas.width = frame.clientWidth;
  canvas.height = frame.clientHeight;
}

function setupKeyboardAndTouch() {
  window.addEventListener('keydown', e => {
    const lane = KEY_MAP[e.code];
    if (lane === undefined) return;
    if (e.repeat) return;
    triggerLanePress(lane);
  });

  window.addEventListener('keyup', e => {
    const lane = KEY_MAP[e.code];
    if (lane === undefined) return;
    triggerLaneRelease(lane);
  });

  const keyLabels = document.querySelectorAll('.key-label');
  
  keyLabels.forEach(label => {
    const lane = parseInt(label.dataset.lane);

    label.addEventListener('touchstart', e => {
      e.preventDefault();
      triggerLanePress(lane);
    }, { passive: false });

    label.addEventListener('touchend', e => {
      e.preventDefault();
      triggerLaneRelease(lane);
    }, { passive: false });

    label.addEventListener('mousedown', e => {
      e.preventDefault();
      triggerLanePress(lane);
    });

    label.addEventListener('mouseup', e => {
      e.preventDefault();
      triggerLaneRelease(lane);
    });

    label.addEventListener('mouseleave', e => {
      triggerLaneRelease(lane);
    });
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    if (selectedSong !== null && !state.playing) startConcert();
  });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (selectedSong !== null && !state.playing) startConcert();
    }
  });
}

function triggerLanePress(lane) {
  const kl = document.getElementById(`kl-${lane}`);
  const pk = document.getElementById(`pk-${lane}`);
  
  kl.classList.add('touch-active');
  pk.classList.add('active');
  document.getElementById('hands').style.transform = 'translateX(-50%) translateY(8px) scale(0.92)';

  playPianoNote(KEY_FREQS[lane]);
  if (state.playing) checkHit(lane);
}

function triggerLaneRelease(lane) {
  const kl = document.getElementById(`kl-${lane}`);
  const pk = document.getElementById(`pk-${lane}`);
  
  kl.classList.remove('touch-active');
  pk.classList.remove('active');
  document.getElementById('hands').style.transform = 'translateX(-50%) translateY(0) scale(1)';

  state.tiles.forEach(t => {
    if (t.lane === lane && t.holding) {
      t.holding = false;
      triggerMiss();
    }
  });
}

function playPianoNote(freq) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.1);
}

function goToDashboard() {
  state.progress = 0;
  document.getElementById('s-dash').classList.add('active');
  document.getElementById('s-game').classList.remove('active');
}

function startConcert() {
  state = {
    playing: true,
    tiles: [],
    particles: [],
    score: 0,
    combo: 0,
    maxCombo: 0,
    songName: SONGS[selectedSong].name,
    progress: 0,
  };

  document.getElementById('s-dash').classList.remove('active');
  document.getElementById('s-game').classList.add('active');

  const audioFile = SONGS[selectedSong].file;
  fetch(audioFile)
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(audioBuffer => {
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      source.start(0);
      state.audioSource = source;
      state.audioStartTime = audioCtx.currentTime;
      state.audioDuration = audioBuffer.duration;
      startGameLoop();
    })
    .catch(err => console.error('Audio error:', err));
}

function startGameLoop() {
  const beatMs = 500;
  let lastSpawn = 0;

  function loop() {
    const elapsed = (audioCtx.currentTime - state.audioStartTime) * 1000;
    state.progress = elapsed / (state.audioDuration * 1000) || 0;

    if (elapsed - lastSpawn >= beatMs) {
      const lane = Math.floor(Math.random() * 6);
      const isTap = Math.random() > 0.3;
      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#FF6B6B', '#A8E6CF'];
      state.tiles.push({
        id: Math.random(),
        lane,
        y: -100,
        w: canvas.width / 6,
        h: isTap ? 50 : 120,
        color: colors[lane],
        type: isTap ? 'tap' : 'long',
        hit: false,
        holding: false,
      });
      lastSpawn = elapsed;
    }

    state.tiles = state.tiles.filter(t => {
      t.x = t.lane * t.w;
      t.y += 6;
      return t.y < canvas.height + 100;
    });

    state.tiles.forEach(t => {
      if (!t.hit && !t.holding && t.y + t.h > HIT_Y + 100) {
        triggerMiss();
        state.tiles = state.tiles.filter(x => x.id !== t.id);
      }
    });

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(0, 229, 204, 0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, HIT_Y);
    ctx.lineTo(canvas.width, HIT_Y);
    ctx.stroke();

    state.tiles.forEach(drawTile);

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.22;
      p.a -= 0.022;
      if (p.a <= 0) { state.particles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.s, p.s, 2);
      ctx.fill();
      ctx.restore();
    }

    updateHUD();

    if (state.progress >= 1) {
      finishConcert();
    } else {
      state.rafId = requestAnimationFrame(loop);
    }
  }

  loop();
}

function drawTile(t) {
  const { x, y, w, h, color, type } = t;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(x + 5, y + 5, w, h, 8);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill();

  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.stroke();

  const gloss = ctx.createLinearGradient(x, y, x, y + Math.min(h, 30));
  gloss.addColorStop(0, 'rgba(255,255,255,0.35)');
  gloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gloss;
  ctx.beginPath();
  ctx.roundRect(x + 2, y + 2, w - 4, Math.min(h - 4, 28), 6);
  ctx.fill();

  if (type === 'long' && h > 30) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y + 8);
    ctx.lineTo(x + w / 2, y + h - 8);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function checkHit(lane) {
  const candidates = state.tiles
    .filter(t => t.lane === lane && !t.hit && !t.holding)
    .sort((a, b) => Math.abs((b.y + b.h) - HIT_Y) - Math.abs((a.y + a.h) - HIT_Y));

  if (candidates.length === 0) {
    triggerMiss();
    return;
  }

  const t = candidates[candidates.length - 1];
  const headY = t.y + t.h;

  if (headY >= HIT_Y - 90 && headY <= HIT_Y + 65) {
    if (t.type === 'tap') {
      t.hit = true;
      triggerPerfect(t.color);
      spawnExplosion(t.x + t.w / 2, HIT_Y, t.color);
      state.tiles = state.tiles.filter(x => x.id !== t.id);
    } else {
      t.holding = true;
    }
  } else {
    triggerMiss();
  }
}

function triggerPerfect(color) {
  state.score += 150;
  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;
  showRating('PERFECT!', color);
  pulseBoard(color);
}

function triggerMiss() {
  state.combo = 0;
  showRating('MISS', '#FF4D4D');
  shakeBoard();
}

let ratingTimer = null;
function showRating(text, color) {
  const el = document.getElementById('rating-popup');
  el.textContent = text;
  el.style.color = color;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  clearTimeout(ratingTimer);
  ratingTimer = setTimeout(() => el.classList.remove('pop'), 220);
}

function pulseBoard(color) {
  if (state.combo < 10) return;
  const flash = document.getElementById('beat-flash');
  flash.style.background = color;
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 80);
}

function shakeBoard() {
  const frame = document.getElementById('piano-frame');
  frame.style.transform = 'translateX(-3px)';
  setTimeout(() => frame.style.transform = 'translateX(2px)', 30);
  setTimeout(() => frame.style.transform = 'translateX(0)', 60);
}

function updateHUD() {
  document.getElementById('g-score').textContent = String(state.score).padStart(6, '0');
  document.getElementById('g-combo').textContent = state.combo;
  document.getElementById('g-percent').textContent = Math.floor(state.progress * 100) + '%';
  document.getElementById('g-prog-fill').style.width = (state.progress * 100) + '%';
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 18; i++) {
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 4,
      s: Math.random() * 10 + 5,
      color,
      a: 1,
    });
  }
}

function finishConcert() {
  state.playing = false;
  cancelAnimationFrame(state.rafId);

  const shortName = state.songName.split(' - ')[0];
  const existing = history.find(r => r.song === shortName);
  if (!existing || state.score > existing.score) {
    history = history.filter(r => r.song !== shortName);
    history.push({ song: shortName, score: state.score, combo: state.maxCombo });
    localStorage.setItem('neopiano_v2', JSON.stringify(history));
  }

  let grade = 'C', gradeColor = '#888';
  if (state.score > 5000) { grade = 'S'; gradeColor = '#FFE033'; }
  else if (state.score > 3000) { grade = 'A'; gradeColor = '#22C55E'; }
  else if (state.score > 1500) { grade = 'B'; gradeColor = '#00E5CC'; }

  Swal.fire({
    title: 'KONSER SELESAI!',
    html: `<div style="font-family:'Bebas Neue',sans-serif;font-size:80px;color:${gradeColor};-webkit-text-stroke:2px #000;text-shadow:5px 5px 0 #000;line-height:1;margin-bottom:8px;">${grade}</div><table style="width:100%;font-family:'JetBrains Mono',monospace;font-size:13px;border-collapse:collapse"><tr><td style="padding:6px 10px;text-align:left;color:#888">SKOR</td><td style="padding:6px 10px;text-align:right;font-weight:700;font-size:18px">${state.score.toLocaleString()} pts</td></tr><tr><td style="padding:6px 10px;text-align:left;color:#888">MAX COMBO</td><td style="padding:6px 10px;text-align:right;font-weight:700;font-size:18px;color:#A855F7">${state.maxCombo}×</td></tr></table>`,
    confirmButtonText: '↩ KEMBALI',
    confirmButtonColor: '#2EC4B6',
    allowOutsideClick: false,
    background: '#F5F2E8',
  }).then(() => {
    updateScoreTable();
    goToDashboard();
  });
}

function updateScoreTable() {
  const tbody = document.getElementById('score-tbody');
  tbody.innerHTML = history.slice(-4).reverse().map(r => `<tr><td>${r.song}</td><td class="td-score">${r.score}</td><td class="td-combo">${r.combo}×</td></tr>`).join('');
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}
</script>
